name: Setup Node.js and pnpm
description: Install Node.js 24.16.0, pnpm from packageManager, cache the pnpm store, and install dependencies with a frozen lockfile

runs:
  using: composite
  steps:
    - name: Set up Node.js 24.16.0
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24.16.0

    - name: Set up pnpm from packageManager
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        run_install: false

    - name: Resolve pnpm store directory
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store from pnpm-lock.yaml
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-

    - name: Install dependencies with frozen lockfile
      shell: bash
      run: pnpm install --frozen-lockfile
