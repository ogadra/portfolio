name: Pnpm task

on:
  workflow_call:
    inputs:
      task:
        required: true
        type: string

permissions:
  contents: read

jobs:
  run:
    name: Run pnpm task
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js 24.16.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0

      - name: Set up pnpm from packageManager
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Resolve pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store from pnpm-lock.yaml
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Validate task name
        shell: bash
        env:
          TASK: ${{ inputs.task }}
        run: |
          case "$TASK" in
            check|test|build|astro-dev|wrangler-dev) ;;
            *) exit 1 ;;
          esac

      - name: Install dependencies with frozen lockfile
        run: pnpm install --frozen-lockfile

      - name: Run pnpm check
        if: inputs.task == 'check'
        run: pnpm check

      - name: Run pnpm test
        if: inputs.task == 'test'
        run: pnpm test

      - name: Run pnpm build
        if: inputs.task == 'build' || inputs.task == 'wrangler-dev'
        run: pnpm build

      - name: Start astro dev and expect HTTP 200
        if: inputs.task == 'astro-dev'
        run: scripts/wait-for-http.sh http://127.0.0.1:4321/ -- pnpm dev --host 127.0.0.1 --port 4321

      - name: Start wrangler dev and expect HTTP 200
        if: inputs.task == 'wrangler-dev'
        env:
          WRANGLER_SEND_METRICS: false
        run: scripts/wait-for-http.sh http://127.0.0.1:8787/ -- pnpm preview --ip 127.0.0.1 --port 8787
