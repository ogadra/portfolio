name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  astro-ssr-build:
    name: Build Astro SSR output for Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build
