name: Dev smoke

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  astro-dev:
    name: Start astro dev and request home page
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup

      - name: Start astro dev and expect HTTP 200
        run: scripts/wait-for-http.sh http://127.0.0.1:4321/ -- pnpm dev --host 127.0.0.1 --port 4321

  wrangler-dev:
    name: Start wrangler dev and request home page
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Start wrangler dev and expect HTTP 200
        env:
          WRANGLER_SEND_METRICS: false
        run: scripts/wait-for-http.sh http://127.0.0.1:8787/ -- pnpm preview --ip 127.0.0.1 --port 8787
